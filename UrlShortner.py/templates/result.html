{% extends 'base.html' %}

{% block title %}Short URL{% endblock %}

{% block content %}

<div class="card shadow-lg border-0 p-5">

    <div class="text-center">

        <i class="fa-solid fa-circle-check fa-3x text-success mb-3"></i>

        <h2 class="fw-bold">
            URL Generated Successfully
        </h2>

        <p class="text-muted">
            Your short link is ready to use.
        </p>

    </div>

    <!-- Original URL -->

    <label class="form-label mt-4 fw-semibold">
        Original URL
    </label>

    <input
        class="form-control"
        value="{{ original_url }}"
        readonly
    >

    <!-- Short URL -->

    <label class="form-label mt-4 fw-semibold">
        Short URL
    </label>

    <input
        id="shortURL"
        class="form-control"
        value="{{ short_url }}"
        readonly
    >
    <div class="text-center mt-4">

    <h5>QR Code</h5>
        <p><strong>Filename:</strong> {{ qr_image }}</p>
    <img
        src="{{ url_for('static', filename='qr/' + qr_image) }}"
        class="img-fluid"
        style="max-width:200px;"
        alt="QR Code">

</div>

    <!-- Success Message -->

    <div class="alert alert-success mt-4 text-center">

        <i class="fa-solid fa-check-circle"></i>

        Link generated successfully.

    </div>

    <!-- Buttons -->

    <div class="d-grid gap-3 mt-4">

        <button
            onclick="copyURL()"
            class="btn btn-success">

            <i class="fa-solid fa-copy"></i>

            Copy Link

        </button>

        <a
            href="{{ short_url }}"
            target="_blank"
            class="btn btn-primary">

            <i class="fa-solid fa-up-right-from-square"></i>

            Open Short Link

        </a>

        <a
            href="/"
            class="btn btn-secondary">

            <i class="fa-solid fa-house"></i>

            Back to Home

        </a>

    </div>

</div>

{% endblock %}
